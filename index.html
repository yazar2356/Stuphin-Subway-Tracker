<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #fff; font-family: 'Helvetica Neue', Arial; text-align: center; margin: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; overflow: hidden; }
        .station { font-size: 4vh; color: #888; text-transform: uppercase; margin-bottom: 2vh; }
        .f-circle { background: #FF6319; color: white; border-radius: 50%; width: 25vh; height: 25vh; line-height: 25vh; font-size: 18vh; font-weight: bold; margin: 0 auto; }
        .timer { font-size: 25vh; font-weight: 900; color: #FF6319; margin: 2vh 0; }
        .sub-text { font-size: 5vh; color: #444; }
    </style>
</head>
<body>
    <div class="station">Sutphin Blvd – Manhattan Bound</div>
    <div class="f-circle">F</div>
    <div id="time" class="timer">--</div>
    <div id="next" class="sub-text">Loading...</div>

    <script>
        async function updateF() {
            try {
                // Fetching Sutphin Blvd (F05) specifically
                const response = await fetch("https://api.wheresthefuckingtrain.com/by-id/F05");
                const data = await response.json();

                // Locate the stop in the data array
                const stop = data.data.find(s => s.id === "F05");
                if (!stop) throw new Error("Station Data Missing");

                // "S" array contains Southbound (Manhattan-bound) trains
                const southbound = stop.S.filter(t => t.route === "F");

                if (southbound.length > 0) {
                    const now = Math.floor(Date.now() / 1000);
                    
                    // Calculate minutes until arrival (Arrival Time - Current Time)
                    const mins0 = Math.round((new Date(southbound[0].time).getTime() / 1000 - now) / 60);
                    const mins1 = southbound[1] ? Math.round((new Date(southbound[1].time).getTime() / 1000 - now) / 60) : null;

                    document.getElementById('time').innerText = Math.max(0, mins0) + " MIN";
                    document.getElementById('next').innerText = mins1 !== null
                        ? "Following: " + Math.max(0, mins1) + " min"
                        : "No second train";
                } else {
                    document.getElementById('time').innerText = "NO F";
                    document.getElementById('next').innerText = "No Manhattan-bound trains";
                }
            } catch (err) {
                console.error(err);
                document.getElementById('time').innerText = "ERR";
                document.getElementById('next').innerText = "Retrying in 30s...";
            }
        }

        // Auto-refresh every 30 seconds
        setInterval(updateF, 30000);
        updateF();
    </script>
</body>
</html>
