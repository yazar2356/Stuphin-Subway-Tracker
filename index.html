<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #fff; font-family: 'Helvetica Neue', Arial; text-align: center; margin: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; }
        .station { font-size: 4vh; color: #888; text-transform: uppercase; }
        .f-circle { background: #FF6319; color: white; border-radius: 50%; width: 20vh; height: 20vh; line-height: 20vh; font-size: 15vh; font-weight: bold; margin: 2vh auto; }
        .timer { font-size: 25vh; font-weight: 900; color: #FF6319; }
        .sub-text { font-size: 5vh; color: #444; }
    </style>
</head>
<body>
    <div class="station">Sutphin Blvd - Manhattan Bound</div>
    <div class="f-circle">F</div>
    <div id="time" class="timer">-- MIN</div>
    <div id="next" class="sub-text">Next: -- min</div>

    <script>
        async function updateF() {
            try {
                // We use an open-source MTA JSON proxy
                const res = await fetch('https://mta-api.herokuapp.com/stop/F05'); 
                const data = await res.json();
                
                // Filter for Manhattan-bound (Southbound) trains
                const arrivals = data.arrivals.filter(t => t.route === 'F');
                
                if (arrivals.length > 0) {
                    document.getElementById('time').innerText = arrivals[0].time + " MIN";
                    document.getElementById('next').innerText = "Following: " + (arrivals[1]?.time || "--") + " min";
                }
            } catch (e) { console.log("Waiting for update..."); }
        }
        setInterval(updateF, 30000); 
        updateF();
    </script>
</body>
</html>
