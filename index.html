<script>
    async function updateF() {
        try {
            const proxy = "https://corsproxy.io/?";
            const target = "https://api.wheresthefuckingtrain.com/by-id/F05";
            
            const response = await fetch(proxy + encodeURIComponent(target));
            const data = await response.json();

            const stop = data.data.find(s => s.id === "F05");
            
            // 1. FILTER: Only Manhattan-bound (Southbound)
            // 2. FILTER: Only show trains at least 1 minute away to avoid "0 MIN" ghosting
            const now = Math.floor(Date.now() / 1000);
            const southbound = stop.S
                .filter(t => t.route === "F")
                .map(t => ({
                    ...t,
                    mins: Math.floor((new Date(t.time).getTime() / 1000 - now) / 60)
                }))
                .filter(t => t.mins >= 1); // Exclude trains that have already "arrived" (0 or less)

            if (southbound.length > 0) {
                // Primary display
                document.getElementById('time').innerText = southbound[0].mins + " MIN";
                
                // Secondary display
                if (southbound[1]) {
                    document.getElementById('next').innerText = "Following: " + southbound[1].mins + " min";
                } else {
                    document.getElementById('next').innerText = "Checking next...";
                }
            } else {
                document.getElementById('time').innerText = "WAIT";
                document.getElementById('next').innerText = "Searching for next F...";
            }
        } catch (err) {
            console.error("Data error:", err);
            document.getElementById('time').innerText = "SYNC";
        }
    }
    
    setInterval(updateF, 30000); // 30-second refresh cycle
    updateF();
</script>
