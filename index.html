<script>
    async function updateF() {
        try {
            const proxy = "https://corsproxy.io/?";
            const target = "https://api.wheresthefuckingtrain.com/by-id/F05";
            
            const response = await fetch(proxy + encodeURIComponent(target));
            const data = await response.json();

            const stop = data.data.find(s => s.id === "F05");
            
            // Current time in seconds
            const now = Math.floor(Date.now() / 1000);

            // Filter for F trains headed South (Manhattan Bound) 
            // and only those more than 60 seconds away
            const southbound = stop.S
                .filter(t => t.route === "F")
                .map(t => {
                    const arrivalTime = Math.floor(new Date(t.time).getTime() / 1000);
                    return Math.floor((arrivalTime - now) / 60);
                })
                .filter(mins => mins > 0); // Ignore trains that are '0' or negative (already arrived)

            if (southbound.length > 0) {
                document.getElementById('time').innerText = southbound[0] + " MIN";
                document.getElementById('next').innerText = southbound[1] 
                    ? "Following: " + southbound[1] + " min" 
                    : "No following trains";
            } else {
                document.getElementById('time').innerText = "WAIT";
                document.getElementById('next').innerText = "Finding next train...";
            }
        } catch (err) {
            console.error("Data error:", err);
            document.getElementById('time').innerText = "SYNC";
        }
    }
    
    setInterval(updateF, 30000);
    updateF();
</script>
