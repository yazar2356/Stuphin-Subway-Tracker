<script>
  async function updateF() {
    try {
      const proxy = "https://corsproxy.io/?";
      const target = "https://api.wheresthefuckingtrain.com/by-id/F05";

      const response = await fetch(proxy + encodeURIComponent(target));
      const data = await response.json();

      const stop = data.data.find(s => s.id === "F05");
      if (!stop || !stop.S || !Array.isArray(stop.S)) {
        throw new Error("Stop data missing");
      }

      const nowMs = Date.now();

      const arrivals = stop.S
        .filter(t => t.route === "F" && t.time)
        .map(t => {
          const arrivalMs = new Date(t.time).getTime();
          return { diffMs: arrivalMs - nowMs };
        })
        .filter(t => t.diffMs > -30000)
        .sort((a, b) => a.diffMs - b.diffMs)
        .slice(0, 3);

      const timeEl = document.getElementById("time");
      const nextEl = document.getElementById("next");

      if (!arrivals.length) {
        timeEl.innerText = "WAIT";
        nextEl.innerText = "No upcoming F trains";
        return;
      }

      const formatMain = (diffMs) => diffMs < 60000 ? "NOW" : `${Math.ceil(diffMs / 60000)} MIN`;
      const formatSmall = (diffMs) => diffMs < 60000 ? "Now" : `${Math.ceil(diffMs / 60000)} min`;

      timeEl.innerText = formatMain(arrivals[0].diffMs);

      const following = arrivals.slice(1).map(t => formatSmall(t.diffMs)).join(" • ");
      nextEl.innerText = following ? `Then: ${following}` : "No later trains listed";

    } catch (err) {
      console.error("Data error:", err);
      document.getElementById("time").innerText = "SYNC";
      document.getElementById("next").innerText = "Unable to load arrivals";
    }
  }

  setInterval(updateF, 30000);
  updateF();
</script>
