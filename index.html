<script>
        async function getTrains() {
            try {
                // Fetching from a secondary reliable JSON source for the F train
                const res = await fetch('https://mta-api.herokuapp.com/by-route/F');
                const data = await res.json();
                
                // We are looking for Sutphin Blvd (Stop F05) Manhattan Bound (Southbound)
                const sutphinS = data.data.find(stop => stop.id === "F05")
                                     .arrivals.filter(t => t.id.includes('S'));
                
                if (sutphinS.length > 0) {
                    // Calculate minutes from now
                    const now = Math.floor(Date.now() / 1000);
                    const arrivalTime = sutphinS[0].time;
                    const diff = Math.round((arrivalTime - now) / 60);
                    
                    document.getElementById('time').innerText = (diff > 0 ? diff : "0") + " MIN";
                    
                    const nextDiff = Math.round((sutphinS[1].time - now) / 60);
                    document.getElementById('next').innerText = "Next: " + nextDiff + " min";
                }
            } catch (e) {
                console.log("Waiting for MTA update...");
            }
        }
        setInterval(getTrains, 30000);
        getTrains();
    </script>
