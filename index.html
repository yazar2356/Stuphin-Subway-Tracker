<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #fff; font-family: 'Helvetica Neue', Arial; text-align: center; margin: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; overflow: hidden; }
        .station { font-size: 4vh; color: #888; text-transform: uppercase; margin-bottom: 2vh; }
        .f-circle { background: #FF6319; color: white; border-radius: 50%; width: 20vh; height: 20vh; line-height: 20vh; font-size: 15vh; font-weight: bold; margin: 0 auto; }
        .timer { font-size: 25vh; font-weight: 900; color: #FF6319; margin: 2vh 0; }
        .sub-text { font-size: 5vh; color: #444; }
    </style>
</head>
<body>
    <div class="station">Sutphin Blvd - Manhattan Bound</div>
    <div class="f-circle">F</div>
    <div id="time" class="timer">SYNCING</div>
    <div id="next" class="sub-text">Connecting to MTA...</div>

    <script>
        async function updateSubway() {
            try {
                // We use 'corsproxy.io' as a bridge to bypass browser security
                // This fetches the data for us and adds the necessary 'All-Clear' headers
                const proxy = "https://corsproxy.io/?";
                const target = "https://mta-api.herokuapp.com/stop/F05";
                
                const response = await fetch(proxy + encodeURIComponent(target));
                const data = await response.json();
                
                // Filter specifically for Manhattan-bound F trains (Southbound)
                const trains = data.arrivals.filter(t => t.route === 'F');

                if (trains.length > 0) {
                    document.getElementById('time').innerText = trains[0].time + " MIN";
                    document.getElementById('next').innerText = "Next: " + (trains[1]?.time || "--") + " min";
                } else {
                    document.getElementById('time').innerText = "NO DATA";
                    document.getElementById('next').innerText = "No upcoming F trains";
                }
            } catch (error) {
                document.getElementById('time').innerText = "RETRYING";
                console.error("Connection failed:", error);
            }
        }

        setInterval(updateSubway, 30000); // Auto-refresh every 30 seconds
        updateSubway();
    </script>
</body>
</html>
